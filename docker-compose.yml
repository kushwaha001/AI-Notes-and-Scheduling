# AI Notes and Scheduling — full stack (Docker alternative for offline deploy).
# See offline/README.md for the offline save/load procedure.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: udaan_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0085"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d udaan_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: udaan_db
      DB_USER: postgres
      DB_PASSWORD: "0085"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9000:9000"

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
